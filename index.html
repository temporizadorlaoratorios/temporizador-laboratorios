<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPORIZADOR SINCRONIZADO</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="icon_transparente.png">
    <link rel="shortcut icon" href="icono.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="INDABI">
    <link rel="apple-touch-icon" href="icon_transparente.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="logo-styles.css">
    <link rel="stylesheet" href="time-controls.css">
    <style>
        .options-menu-btn {
            background-color: transparent;
            color: var(--color-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .options-menu-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        /* Estilos botón Ojito */
        .toggle-password-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.2s, transform 0.2s;
        }
        .toggle-password-btn:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }
        .toggle-password-btn svg { width: 20px; height: 20px; pointer-events: none; }

        /* Estilos para el Gestor de Ajustes */
        .preset-manager-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .preset-manager-table th, .preset-manager-table td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .preset-manager-table th { color: var(--color-primary); text-transform: uppercase; font-size: 0.75rem; }
        .preset-manager-form {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        .preset-grid-main {
            display: grid; 
            grid-template-columns: 120px 1fr 180px 100px; 
            gap: 15px; 
            margin-bottom: 15px;
        }

        .color-picker-wrapper {
            position: relative;
            height: 48px;
            background: var(--color-bg-tertiary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 4px;
            transition: all 0.2s;
        }

        .color-picker-wrapper:hover {
            border-color: var(--color-primary);
        }

        .color-picker-input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            border-radius: 4px;
        }

        .color-picker-input::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker-input::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <div class="background-gradient"></div>
    <div class="container">
        <header>
            <div class="logo-container interactive-logo" id="logo-container" onclick="handleLogoClick(event)">
                <!-- El logo se cargará dinámicamente -->
                <img src="logo.png" alt="INDABI" class="app-logo" id="app-logo" style="display: none;">
                <div id="logo-placeholder" class="logo-placeholder" style="display: none;">
                    <span>📷 Cargar Logo</span>
                </div>
                <!-- Overlay de edición al hacer hover (solo visible si hay logo) -->
                <div id="logo-edit-overlay" class="logo-edit-overlay">
                    <span>✏️ Editar</span>
                </div>
                
                <!-- Menú de opciones de logo (oculto por defecto) -->
                <div id="logo-options-menu" class="logo-options-menu" style="display: none;" onclick="event.stopPropagation()">
                    <button onclick="document.getElementById('logo-upload').click(); closeLogoMenu();" class="logo-menu-btn">Cambiar Logo</button>
                    <button onclick="deleteLogo(); closeLogoMenu();" class="logo-menu-btn delete-btn">Eliminar Logo</button>
                    <button onclick="closeLogoMenu()" class="logo-menu-btn cancel-btn">Cancelar</button>
                </div>
            </div>
            
            <!-- Input oculto para subir logo -->
            <input type="file" id="logo-upload" accept="image/*" style="display: none;">

            <h1 class="app-title-text" id="app-title-display">TEMPORIZADOR SINCRONIZADO</h1>
        </header>

        <main class="main-content">
            <div class="history-top-container" style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" id="toggle-history-btn" class="history-btn-blue">Historial</button>
                
                <div class="options-wrapper" style="position: relative;">
                    <button type="button" onclick="toggleOptionsMenu(event)" class="options-menu-btn" title="Opciones" id="options-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1.5"></circle>
                            <circle cx="12" cy="5" r="1.5"></circle>
                            <circle cx="12" cy="19" r="1.5"></circle>
                        </svg>
                    </button>
                    <!-- Menú Desplegable -->
                    <div id="options-dropdown" style="display: none; position: absolute; right: 0; top: 100%; margin-top: 5px; background-color: var(--color-bg-secondary); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius-sm); box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 3000; min-width: 200px; overflow: hidden;">
                        <button type="button" onclick="openChangePasswordModal()" style="width: 100%; text-align: left; padding: 12px 15px; background: transparent; border: none; color: var(--color-text-primary); cursor: pointer; transition: background 0.2s; font-size: 0.9rem;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">
                            🔑 Cambiar Contraseña
                        </button>
                        <button type="button" onclick="openPresetsModal()" style="width: 100%; text-align: left; padding: 12px 15px; background: transparent; border: none; color: var(--color-text-primary); cursor: pointer; transition: background 0.2s; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05);" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">
                            ⚙️ Configurar Tiempos (Presets)
                        </button>
                    </div>
                </div>

                <button type="button" onclick="logout()" style="background-color: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s;">Salir</button>
            </div>
            <!-- Formulario compacto -->
            <section class="timer-form-section-compact">
                <form id="timer-form" class="timer-form-compact">
                    <input type="text" id="operator-name" placeholder="USUARIO: (ej: JMA)" required
                        class="form-input-compact operator-input">
                    <input type="text" id="patient-name" placeholder="PACIENTE: (ej: FERNANDEZ jUAN)" required
                        class="form-input-compact">
                    <input type="text" id="study-type" placeholder="DESCRIPCION: (ej: PLR)" required
                        class="form-input-compact" list="study-suggestions">
                    <datalist id="study-suggestions">
                        <option value="PLR">
                        <option value="CORTISOL">
                        <option value="ACTH">
                        <option value="CTM">
                        <option value="CTGN">
                        <option value="H.PYLORI">
                    </datalist>

                    <!-- Selector de Modo -->
                    <div class="mode-selector">
                        <label class="mode-option-btn mode-duration">
                            <input type="radio" name="timer-mode" value="duration" checked onchange="toggleTimerMode()">
                            <span>⏳ Cuenta Regresiva</span>
                        </label>
                        <label class="mode-option-btn mode-fixed">
                            <input type="radio" name="timer-mode" value="fixed" onchange="toggleTimerMode()">
                            <span>🔔 Hora Fija</span>
                        </label>
                    </div>

                    <!-- Horas -->
                    <div class="time-control-wrapper">
                        <input type="text" id="timer-hours" value="00" maxlength="2"
                            class="form-input-compact time-input-with-arrows">
                        <div class="time-arrows">
                            <button type="button" class="time-arrow-btn" tabindex="-1"
                                onclick="adjustTime('hours', 1)">▲</button>
                            <button type="button" class="time-arrow-btn" tabindex="-1"
                                onclick="adjustTime('hours', -1)">▼</button>
                        </div>
                        <span class="time-unit-label">h</span>
                    </div>

                    <!-- Minutos -->
                    <div class="time-control-wrapper">
                        <input type="text" id="timer-minutes" value="00" maxlength="2"
                            class="form-input-compact time-input-with-arrows">
                        <div class="time-arrows">
                            <button type="button" class="time-arrow-btn" tabindex="-1"
                                onclick="adjustTime('minutes', 1)">▲</button>
                            <button type="button" class="time-arrow-btn" tabindex="-1"
                                onclick="adjustTime('minutes', -1)">▼</button>
                        </div>
                        <span class="time-unit-label">m</span>
                    </div>

                    <!-- Segundos -->
                    <div class="time-control-wrapper">
                        <input type="text" id="timer-seconds" value="00" maxlength="2"
                            class="form-input-compact time-input-with-arrows">
                        <div class="time-arrows">
                            <button type="button" class="time-arrow-btn" tabindex="-1"
                                onclick="adjustTime('seconds', 1)">▲</button>
                            <button type="button" class="time-arrow-btn" tabindex="-1"
                                onclick="adjustTime('seconds', -1)">▼</button>
                        </div>
                        <span class="time-unit-label">s</span>
                    </div>

                    <button type="submit" class="submit-btn-compact">Agregar</button>
                    <button type="button" class="preset-btn-compact" onclick="clearForm()">Limpiar</button>
                </form>
            </section>

            <!-- Grid de temporizadores -->
            <section class="timers-section">
                <div id="timers-grid" class="timers-grid-compact">
                    <div class="empty-state" id="empty-state">
                        <p>No hay temporizadores activos</p>
                    </div>
                </div>
            </section>



            <!-- Panel Lateral de Historial -->
            <div id="history-panel" class="history-panel">
                <div class="history-header">
                    <h2>Historial de Eventos</h2>
                    <button id="open-export-btn" class="export-btn" title="Exportar a Excel">Exportar</button>
                    <button id="close-history-btn" class="close-history-btn">×</button>
                </div>
                <div class="history-content">
                    <ul id="history-list" class="history-list">
                        <!-- Los eventos se cargarán aquí -->
                    </ul>
                </div>
            </div>

        </main>
    </div>

    <!-- Modal de Exportación -->
    <div id="export-modal" class="modal hidden" onclick="if(event.target === this) this.classList.add('hidden')">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Exportar Historial</h3>
                <button id="close-export-btn" class="close-modal-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Rango de Fechas:</label>
                    <div class="date-range-inputs">
                        <input type="date" id="export-date-start" class="form-input-compact">
                        <span>hasta</span>
                        <input type="date" id="export-date-end" class="form-input-compact">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tipos de Eventos:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" value="TODOS" id="chk-all" checked> Todos</label>
                        <label><input type="checkbox" value="CREADO" class="chk-event" checked> Creación</label>
                        <label><input type="checkbox" value="INICIADO" class="chk-event" checked>
                            Inicio/Reanudación</label>
                        <label><input type="checkbox" value="PAUSADO" class="chk-event" checked> Pausa</label>
                        <label><input type="checkbox" value="REINICIADO" class="chk-event" checked> Reinicio</label>
                        <label><input type="checkbox" value="ELIMINADO" class="chk-event" checked> Eliminación</label>
                        <label><input type="checkbox" value="COMPLETADO" class="chk-event" checked> Completado</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-export-btn" class="btn-secondary">Cancelar</button>
                <button id="confirm-export-btn" class="btn-primary">Descargar Excel/CSV</button>
            </div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker registrado'))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>

    <!-- Modal Cambiar Contraseña -->
    <div id="modal-change-password" onclick="if(event.target === this) closeChangePasswordModal()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; backdrop-filter: blur(8px); z-index: 2000;">
        <div style="background: var(--color-bg-secondary); padding: 30px; border-radius: var(--radius-md); width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.1);">
            <h3 style="margin-top: 0; color: var(--color-primary); margin-bottom: 20px;">Cambiar Contraseña</h3>
            <form id="change-password-form">
                <div style="margin: 15px 0;">
                    <label style="color: var(--color-text-secondary); font-size: 0.85rem; font-weight: 600; text-transform: uppercase;">Contraseña Actual:</label>
                    <div style="position: relative; margin-top: 5px;">
                        <input type="password" id="lab-old-password" required class="form-input-compact" style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                        <button type="button" class="toggle-password-btn" onclick="togglePassVisibility('lab-old-password', this)" id="toggle-lab-old-pass-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div style="margin: 15px 0;">
                    <label style="color: var(--color-text-secondary); font-size: 0.85rem; font-weight: 600; text-transform: uppercase;">Nueva Contraseña:</label>
                    <div style="position: relative; margin-top: 5px;">
                        <input type="password" id="lab-new-password" required class="form-input-compact" style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                        <button type="button" class="toggle-password-btn" onclick="togglePassVisibility('lab-new-password', this)" id="toggle-lab-pass-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="button" onclick="closeChangePasswordModal()" class="control-btn-compact control-btn-secondary-compact" style="flex: 1;">Cancelar</button>
                    <button type="submit" class="submit-btn-compact" style="flex: 1; padding: 10px;">Aceptar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Ajustes de Tiempo (Presets) -->
    <div id="modal-presets" onclick="if(event.target === this) closePresetsModal()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; backdrop-filter: blur(8px); z-index: 2000;">
        <div style="background: var(--color-bg-secondary); padding: 30px; border-radius: 16px; width: 900px; max-width: 95%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255, 255, 255, 0.15);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: var(--color-primary);">Configuración de Tiempos</h3>
                <button onclick="closePresetsModal()" style="background:transparent; border:none; color:#888; font-size:1.5rem; cursor:pointer;">×</button>
            </div>
            
            <!-- Formulario para nuevo preset -->
            <form id="preset-form" class="preset-manager-form">
                <input type="hidden" id="preset-id" value="">
                <div class="preset-grid-main">
                    <div>
                        <label style="display: block; font-size: 0.75rem; color: var(--color-text-secondary); margin-bottom: 5px; font-weight: 600; text-transform: uppercase;">Sigla</label>
                        <input type="text" id="preset-sigla" placeholder="ej: PLR" required class="form-input-compact" style="width: 100%;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.75rem; color: var(--color-text-secondary); margin-bottom: 5px; font-weight: 600; text-transform: uppercase;">Descripción</label>
                        <input type="text" id="preset-desc" placeholder="Descripción completa" required class="form-input-compact" style="width: 100%;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.75rem; color: var(--color-text-secondary); margin-bottom: 5px; font-weight: 600; text-transform: uppercase;">Tipo de Timer</label>
                        <div class="mode-selector" style="margin: 0; padding: 4px; gap: 0.5rem; height: 48px; border: 1px solid rgba(255, 255, 255, 0.1); background: var(--color-bg-tertiary);">
                            <label class="mode-option-btn mode-duration" style="flex: 1; justify-content: center; padding: 6px;">
                                <input type="radio" name="preset-tipo" value="duration" checked>
                                <span style="font-size: 0.9rem;">⏳ Regresiva</span>
                            </label>
                            <label class="mode-option-btn mode-fixed" style="flex: 1; justify-content: center; padding: 6px;">
                                <input type="radio" name="preset-tipo" value="fixed">
                                <span style="font-size: 0.9rem;">🔔 Fija</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.75rem; color: var(--color-text-secondary); margin-bottom: 5px; font-weight: 600; text-transform: uppercase;">Color</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="preset-color" value="#c20078" class="color-picker-input">
                        </div>
                    </div>
                </div>
                <div style="display: flex; gap: 15px; align-items: flex-end; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.7rem; color: #888; margin-bottom: 4px; text-transform: uppercase; text-align: center;">Horas</label>
                        <div class="time-control-wrapper">
                            <input type="text" id="preset-h" value="00" maxlength="2" class="form-input-compact time-input-with-arrows">
                            <div class="time-arrows">
                                <button type="button" class="time-arrow-btn" tabindex="-1" onclick="adjustPresetTime('preset-h', 1)">▲</button>
                                <button type="button" class="time-arrow-btn" tabindex="-1" onclick="adjustPresetTime('preset-h', -1)">▼</button>
                            </div>
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.7rem; color: #888; margin-bottom: 4px; text-transform: uppercase; text-align: center;">Minutos</label>
                        <div class="time-control-wrapper">
                            <input type="text" id="preset-m" value="00" maxlength="2" class="form-input-compact time-input-with-arrows">
                            <div class="time-arrows">
                                <button type="button" class="time-arrow-btn" tabindex="-1" onclick="adjustPresetTime('preset-m', 1)">▲</button>
                                <button type="button" class="time-arrow-btn" tabindex="-1" onclick="adjustPresetTime('preset-m', -1)">▼</button>
                            </div>
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.7rem; color: #888; margin-bottom: 4px; text-transform: uppercase; text-align: center;">Segundos</label>
                        <div class="time-control-wrapper">
                            <input type="text" id="preset-s" value="00" maxlength="2" class="form-input-compact time-input-with-arrows">
                            <div class="time-arrows">
                                <button type="button" class="time-arrow-btn" tabindex="-1" onclick="adjustPresetTime('preset-s', 1)">▲</button>
                                <button type="button" class="time-arrow-btn" tabindex="-1" onclick="adjustPresetTime('preset-s', -1)">▼</button>
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" id="preset-submit-btn" class="submit-btn-compact" style="min-width: 120px; height: 48px;">Añadir</button>
                        <button type="button" id="preset-cancel-edit-btn" class="control-btn-compact control-btn-secondary-compact" style="display: none; height: 48px; padding: 0 20px;" onclick="cancelPresetEdit()">Cancelar</button>
                    </div>
                </div>
            </form>

            <div style="max-height: 300px; overflow-y: auto;">
                <table class="preset-manager-table">
                    <thead>
                        <tr>
                            <th>Sigla</th>
                            <th>Descripción</th>
                            <th style="width: 120px;">Tipo</th>
                            <th style="width: 100px;">Tiempo</th>
                            <th style="width: 60px;">Color</th>
                            <th style="width: 100px;">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="presets-list">
                        <!-- Se carga con JS -->
                    </tbody>
                </table>
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <button onclick="closePresetsModal()" class="control-btn-compact control-btn-secondary-compact" style="padding: 8px 15px;">Cerrar</button>
            </div>
        </div>
    </div>
    
    <script src="script.js?v=16"></script>
</body>
</html>
