<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Gestión de Laboratorios</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="icon_transparente.png">
    <link rel="shortcut icon" href="icono.ico">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--color-bg-card);
            padding: 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .stat-card h3 { margin: 0 0 10px 0; color: var(--color-text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em;}
        .stat-card p { 
            margin: 0; 
            font-size: 2.5rem; 
            font-family: var(--font-mono);
            font-weight: bold; 
            background: var(--gradient-primary); 
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .lab-table-container {
            background: var(--color-bg-secondary);
            padding: 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .lab-table-container h2 {
            color: var(--color-primary);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--color-text-primary);
        }
        th { 
            background-color: var(--color-bg-tertiary); 
            font-weight: 600; 
            color: var(--color-text-secondary); 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 0.05em;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-online { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
        .badge-offline { background: rgba(255, 100, 100, 0.15); color: var(--color-danger); border: 1px solid var(--color-danger); }
        
        .admin-actions {
            display: flex; gap: 8px; justify-content: center; margin-top: 15px; margin-bottom: 30px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.2s, transform 0.2s;
        }
        .toggle-password:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }
        .toggle-password svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        .form-label { color: var(--color-text-secondary); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        #modal-lab, #modal-profile {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            z-index: 1000;
        }
        .modal-content {
            background: var(--color-bg-secondary);
            padding: 30px;
            border-radius: var(--radius-md);
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-content h3 {
            margin-top: 0;
            color: var(--color-primary);
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <div class="background-gradient"></div>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Laboratorios" class="app-logo">
            </div>
            <h1 class="app-title-text" style="font-size: 2.2rem;">Panel de Control Global</h1>
            <div class="admin-actions">
                <button onclick="window.open('index.html', '_blank')" class="history-btn-blue"> Abrir Temporizador </button>
                <button onclick="openProfileModal()" class="preset-btn-compact" style="border-color: var(--color-primary); color: var(--color-primary);"> Mi Perfil </button>
                <button onclick="logout()" class="preset-btn-compact" style="border-color: var(--color-danger); color: var(--color-danger);"> Cerrar Sesión </button>
            </div>
        </header>

        <main class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Laboratorios Totales</h3>
                    <p id="stat-total-labs">0</p>
                </div>
                <div class="stat-card">
                    <h3>Timers Activos</h3>
                    <p id="stat-active-conn">0</p>
                </div>
                <div class="stat-card">
                    <h3>Labs con Timers</h3>
                    <p id="stat-online-labs">0</p>
                </div>
            </div>

            <div class="lab-table-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">Gestión de Clientes</h2>
                    <button onclick="openCreateModal()" class="submit-btn-compact" style="width: auto; padding: 0 20px;">+ Nuevo Laboratorio</button>
                </div>
                <table id="lab-table">
                    <thead>
                        <tr>
                            <th>Laboratorio</th>
                            <th>Email Acceso</th>
                            <th>Contraseña</th>
                            <th>Estado</th>
                            <th>PCs Máx</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lab-list">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal para editar/crear laboratorio -->
    <div id="modal-lab">
        <div class="modal-content">
            <h3 id="modal-lab-title">Gestión de Laboratorio</h3>
            <form id="lab-form">
                <input type="hidden" id="lab-id">
                <div style="margin: 15px 0;">
                    <label class="form-label">Nombre del Laboratorio:</label>
                    <input type="text" id="lab-nombre" required class="form-input-compact" style="width: 100%; margin-top: 5px;">
                </div>
                <div style="margin: 15px 0;">
                    <label class="form-label">Email de Acceso:</label>
                    <input type="email" id="lab-email" required class="form-input-compact" style="width: 100%; margin-top: 5px;">
                </div>
                <div style="margin: 15px 0;">
                    <label class="form-label">Contraseña:</label>
                    <div style="position: relative; margin-top: 5px;">
                        <input type="password" id="lab-password" required class="form-input-compact" style="width: 100%; padding-right: 40px;">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('lab-password', this)" id="toggle-lab-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div style="margin: 15px 0;">
                    <label class="form-label">Máximo de PCs:</label>
                    <input type="number" id="lab-max-pcs" min="1" step="1" required class="form-input-compact" style="width: 100%; margin-top: 5px;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="button" onclick="closeModal('modal-lab')" class="control-btn-compact control-btn-secondary-compact" style="flex: 1;">Cancelar</button>
                    <button type="submit" class="submit-btn-compact" style="flex: 1; padding: 10px;">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para perfil admin -->
    <div id="modal-profile">
        <div class="modal-content">
            <h3>Mi Perfil de Administrador</h3>
            <form id="admin-profile-form">
                <div style="margin: 15px 0;">
                    <label class="form-label">Email de Administrador:</label>
                    <input type="email" id="admin-email" required class="form-input-compact" style="width: 100%; margin-top: 5px;">
                </div>
                <div style="margin: 15px 0;">
                    <label class="form-label">Contraseña Actual:</label>
                    <div style="position: relative; margin-top: 5px;">
                        <input type="password" id="admin-current-password" class="form-input-compact" style="width: 100%; padding-right: 40px;" readonly>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('admin-current-password', this)" id="toggle-current-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div style="margin: 15px 0;">
                    <label class="form-label">Nueva Contraseña:</label>
                    <div style="position: relative; margin-top: 5px;">
                        <input type="password" id="admin-new-password" class="form-input-compact" style="width: 100%; padding-right: 40px;">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('admin-new-password', this)" id="toggle-new-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="button" onclick="closeModal('modal-profile')" class="control-btn-compact control-btn-secondary-compact" style="flex: 1;">Cancelar</button>
                    <button type="submit" class="submit-btn-compact" style="flex: 1; padding: 10px;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== SUPABASE INIT ====================
        const supabaseUrl = 'https://qhjrqfrsphctbdjubxpv.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoanJxZnJzcGhjdGJkanVieHB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg5NzAsImV4cCI6MjA5MDgwNDk3MH0.fLF8SGXXE7BdbdzUHo7GiBM58BbZkUN89N8Cl1KnEHk';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const token = localStorage.getItem('sb-token');
        if (!token) window.location.href = 'login.html';

        let currentAdminProfile = null;
        let allLabs = [];
        let allPerfiles = [];

        // ==================== CARGAR DATOS ====================
        async function refreshData() {
            const { data: labs } = await supabase.from('laboratorios').select('*');
            const { data: perfiles } = await supabase.from('perfiles').select('*');
            const { data: timersActivos } = await supabase.from('timers').select('id, laboratorio_id').eq('isRunning', true);
            
            allLabs = labs || [];
            allPerfiles = perfiles || [];
            
            const superAdmin = perfiles ? perfiles.find(p => p.rol === 'super_admin') : null;
            if (superAdmin) currentAdminProfile = superAdmin;

            const stats = {
                labs: allLabs.map(l => {
                    const perfil = allPerfiles.find(p => p.laboratorio_id === l.id);
                    const labTimers = (timersActivos || []).filter(t => t.laboratorio_id === l.id);
                    return {
                        ...l,
                        email: perfil ? perfil.email : '',
                        password: perfil ? perfil.password : '',
                        active_timers: labTimers.length,
                        has_timers: labTimers.length > 0
                    };
                }),
                total_active_timers: (timersActivos || []).length,
                superAdmin: superAdmin ? { email: superAdmin.email, password: superAdmin.password } : null
            };

            renderLabs(stats);
            updateStats(stats);
        }

        function renderLabs(stats) {
            const list = document.getElementById('lab-list');
            list.innerHTML = '';
            
            stats.labs.forEach(lab => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${lab.nombre}</td>
                    <td style="font-family: var(--font-mono); font-size: 0.9rem;">${lab.email}</td>
                    <td style="font-family: var(--font-mono); font-size: 0.9rem;">${lab.password}</td>
                    <td><span class="badge ${lab.activo ? 'badge-online' : 'badge-offline'}">${lab.activo ? 'ACTIVO' : 'INACTIVO'}</span></td>
                    <td>${lab.max_pcs}</td>
                    <td>
                        <div style="display: flex; gap: 5px;">
                            <button class="control-btn-compact control-btn-secondary-compact" onclick='openEditModal(${JSON.stringify(lab).replace(/'/g, "&#39;")})'>Editar</button>
                            <button class="control-btn-compact ${lab.activo ? 'control-btn-danger-compact' : 'history-btn-blue'}" onclick="toggleStatus('${lab.id}', ${lab.activo})">
                                ${lab.activo ? 'Desactivar' : 'Activar'}
                            </button>
                            <button class="control-btn-compact control-btn-danger-compact" onclick="deleteLab('${lab.id}', '${lab.nombre}')">Eliminar</button>
                        </div>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        function updateStats(stats) {
            document.getElementById('stat-total-labs').textContent = stats.labs.length;
            document.getElementById('stat-active-conn').textContent = stats.total_active_timers;
            document.getElementById('stat-online-labs').textContent = stats.labs.filter(l => l.has_timers).length;
        }

        // ==================== MODALES ====================
        function openCreateModal() {
            resetPasswordInputs();
            document.getElementById('modal-lab-title').textContent = 'Nuevo Laboratorio';
            document.getElementById('lab-id').value = '';
            document.getElementById('lab-nombre').value = '';
            document.getElementById('lab-email').value = '';
            document.getElementById('lab-password').value = '';
            document.getElementById('lab-max-pcs').value = 3;
            document.getElementById('modal-lab').style.display = 'flex';
        }

        function openEditModal(lab) {
            resetPasswordInputs();
            document.getElementById('modal-lab-title').textContent = 'Editar Laboratorio';
            document.getElementById('lab-id').value = lab.id;
            document.getElementById('lab-nombre').value = lab.nombre;
            document.getElementById('lab-email').value = lab.email;
            document.getElementById('lab-password').value = lab.password;
            document.getElementById('lab-max-pcs').value = lab.max_pcs;
            document.getElementById('modal-lab').style.display = 'flex';
        }

        function openProfileModal() {
            resetPasswordInputs();
            if (currentAdminProfile) {
                document.getElementById('admin-email').value = currentAdminProfile.email || '';
                document.getElementById('admin-current-password').value = currentAdminProfile.password || '';
            }
            document.getElementById('admin-new-password').value = '';
            document.getElementById('modal-profile').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // ==================== PASSWORD TOGGLE ====================
        const eyeSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeSlashSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

        function resetPasswordInputs() {
            ['lab-password', 'admin-current-password', 'admin-new-password'].forEach(id => {
                const inp = document.getElementById(id);
                if (inp) inp.type = 'password';
            });
        }

        function togglePasswordVisibility(inputId, btnEl) {
            const inp = document.getElementById(inputId);
            if (inp.type === 'password') { inp.type = 'text'; btnEl.innerHTML = eyeSlashSvg; }
            else { inp.type = 'password'; btnEl.innerHTML = eyeSvg; }
        }

        // ==================== CRUD LABORATORIOS (SUPABASE) ====================
        document.getElementById('lab-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('lab-id').value;
            const nombre = document.getElementById('lab-nombre').value;
            const email = document.getElementById('lab-email').value;
            const password = document.getElementById('lab-password').value;
            const max_pcs = parseInt(document.getElementById('lab-max-pcs').value);

            if (id) {
                // Actualizar laboratorio existente
                await supabase.from('laboratorios').update({ nombre, max_pcs }).eq('id', id);
                // Actualizar el perfil asociado
                const perfil = allPerfiles.find(p => p.laboratorio_id === id);
                if (perfil) {
                    await supabase.from('perfiles').update({ email, password }).eq('id', perfil.id);
                }
                alert('Laboratorio actualizado correctamente.');
            } else {
                // Crear nuevo laboratorio
                const newLabId = `lab-${Date.now()}`;
                await supabase.from('laboratorios').insert({ id: newLabId, nombre, max_pcs, activo: true });
                await supabase.from('perfiles').insert({
                    id: `user-${Date.now()}`,
                    email,
                    password,
                    rol: 'user',
                    laboratorio_id: newLabId
                });
                alert('Laboratorio creado correctamente.');
            }
            closeModal('modal-lab');
            refreshData();
        };

        // Perfil Admin
        document.getElementById('admin-profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const newPassword = document.getElementById('admin-new-password').value;

            if (confirm('¿Actualizar tu perfil de administrador?')) {
                const updateData = { email };
                if (newPassword) updateData.password = newPassword;
                await supabase.from('perfiles').update(updateData).eq('id', token);
                alert('Perfil actualizado.');
                closeModal('modal-profile');
                refreshData();
            }
        };

        async function deleteLab(id, name) {
            if (confirm(`¿Eliminar "${name}"? Esta acción no se puede deshacer.`)) {
                await supabase.from('perfiles').delete().eq('laboratorio_id', id);
                await supabase.from('timers').delete().eq('laboratorio_id', id);
                await supabase.from('laboratorios').delete().eq('id', id);
                alert('Laboratorio eliminado.');
                refreshData();
            }
        }

        async function toggleStatus(id, current) {
            await supabase.from('laboratorios').update({ activo: !current }).eq('id', id);
            refreshData();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // ==================== INICIO ====================
        refreshData();
        // Refrescar cada 30 segundos
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
