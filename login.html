<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Temporizador INDABI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="icon_transparente.png">
    <link rel="shortcut icon" href="icono.ico">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            /* Se apoya en style.css (Inter, color-bg-primary, etc) */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* Contenedor del formulario estilo tarjeta */
        .login-container {
            background: var(--color-bg-secondary);
            padding: 2.5rem 2rem;
            border-radius: var(--radius-md);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .login-container img {
            max-width: 180px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(194, 0, 120, 0.3));
        }

        h2 {
            color: var(--color-text-primary);
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: var(--color-bg-tertiary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            font-size: 1rem;
            font-family: var(--font-main);
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(194, 0, 120, 0.2);
        }

        input::placeholder {
            color: var(--color-text-muted);
        }

        /* Botón de ojito para la contraseña */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 36px;
            background: transparent;
            border: none;
            color: var(--color-primary); /* Fucsia clásico a tono con el logo */
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.2s, transform 0.2s;
        }

        .toggle-password:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(194, 0, 120, 0.4);
        }

        #error-message {
            color: var(--color-danger);
            margin-top: 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
            background: rgba(255, 0, 0, 0.1);
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <div class="background-gradient"></div>
    <div class="login-container">
        <img src="logo.png" alt="Logo INDABI">
        <h2>Acceso Laboratorios</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="tu@laboratorio.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
                <button type="button" class="toggle-password" id="toggle-password" title="Mostrar/Ocultar contraseña">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <button type="submit" class="btn-submit">Entrar</button>
            <p id="error-message">Credenciales incorrectas o cuenta inactiva.</p>
        </form>
    </div>

    <script>
        // Inicializar Supabase
        const supabaseUrl = 'https://qhjrqfrsphctbdjubxpv.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFomanJxZnNwaGN0YmRqdWJ4cHYiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3NTIyODk3MCwiZXhwIjoyMDkwODA0OTcwfQ.fLF8SGXXE7BdbdzUHo7GiBM58BbZkUN89N8Cl1KnEHk';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Lógica para mostrar/ocultar contraseña
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        const eyeSvg = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        `;
        const eyeSlashSvg = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" x2="22" y1="2" y2="22"/>
            </svg>
        `;

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' ? eyeSvg : eyeSlashSvg;
        });

        // Lógica de login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            try {
                const { data: perfiles, error } = await supabase
                    .from('perfiles')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password);

                if (error) {
                    errorMsg.textContent = 'Error de conexión con la base de datos.';
                    errorMsg.style.display = 'block';
                    return;
                }

                if (perfiles && perfiles.length > 0) {
                    const user = perfiles[0];
                    localStorage.setItem('sb-token', user.id);
                    localStorage.setItem('lab-id', user.laboratorio_id || 'super-admin');
                    
                    if (user.laboratorio_id && user.laboratorio_id !== 'super-admin') {
                        const { data: labs } = await supabase
                            .from('laboratorios')
                            .select('nombre, logo, activo')
                            .eq('id', user.laboratorio_id);
                            
                        if (labs && labs.length > 0) {
                            if (!labs[0].activo) {
                                errorMsg.textContent = 'Este laboratorio está inactivo.';
                                errorMsg.style.display = 'block';
                                return;
                            }
                            localStorage.setItem('lab-logo', labs[0].logo || '');
                            localStorage.setItem('lab-nombre', labs[0].nombre || 'Laboratorio');
                        }
                    } else {
                        localStorage.setItem('lab-nombre', 'Super Admin');
                    }
                    
                    if (user.rol === 'super_admin' || user.laboratorio_id === 'super-admin') {
                        window.location.href = 'superadmin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    errorMsg.textContent = 'Credenciales incorrectas u ocurrio un error.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión servidor.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
